<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Secret Surprise 💖</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;600&family=Pacifico&display=swap" rel="stylesheet">

<style>

/* RESET */
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

/* BODY */
body {
    font-family: 'Poppins', sans-serif;
    background: linear-gradient(135deg, #ff9ecf, #ffcce6);
    overflow-x: hidden;
}

/* FLOATING BACKGROUND */
body::before {
    content: "💖 ✨ 🌸 🐻 💕 ⭐ 💫 🦋 💗";
    position: fixed;
    width: 100%;
    height: 100%;
    font-size: 40px;
    opacity: 0.15;
    animation: float 20s linear infinite;
    z-index: 0;
}

@keyframes float {
    from { transform: translateY(0); }
    to { transform: translateY(-1000px); }
}

/* COMMON SECTION */
.section {
    min-height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    flex-direction: column;
    text-align: center;
    padding: 20px;
    position: relative;
    z-index: 1;
}

/* ALIEN */
.alien {
    font-size: clamp(50px, 10vw, 80px);
    animation: bounce 2s infinite;
}

@keyframes bounce {
    0%,100% { transform: translateY(0); }
    50% { transform: translateY(-15px); }
}

/* BOARD */
.board {
    background: white;
    padding: 12px 20px;
    border-radius: 20px;
    margin-top: 10px;
    font-weight: bold;
    box-shadow: 0 0 10px pink;
}

/* TITLE */
.title {
    font-family: 'Pacifico', cursive;
    font-size: clamp(22px, 6vw, 38px);
    color: white;
    text-shadow: 0 0 10px hotpink;
    margin: 20px 0;
}

/* INPUT */
input {
    width: 80%;
    max-width: 300px;
    padding: 12px;
    border-radius: 25px;
    border: none;
    text-align: center;
    font-size: 16px;
    outline: none;
}

/* BUTTON */
button {
    margin-top: 15px;
    padding: 12px 25px;
    border-radius: 25px;
    border: none;
    background: hotpink;
    color: white;
    font-size: 16px;
    cursor: pointer;
    box-shadow: 0 0 10px pink;
    transition: 0.3s;
}

button:hover {
    transform: scale(1.05);
}

/* PAGE 2 */
#page2 {
    display: none;
}

/* FUN TEXT */
.fun-text {
    font-size: clamp(18px, 5vw, 28px);
    color: white;
    text-shadow: 0 0 8px purple;
    margin-top: 20px;
}

/* MONKEY IMAGE */
.monkey {
    width: 70%;
    max-width: 220px;
    margin-top: 20px;
    border-radius: 20px;
}

</style>
</head>

<body>

<!-- PAGE 1 -->
<div class="section" id="page1">

    <div class="alien">👽</div>
    <div class="board">Welcome to this page 💖</div>

    <div class="title">Enter Your Secret Code 🔐</div>

    <input type="password" id="code" placeholder="Enter secret code">
    <button onclick="checkCode()">OK</button>

</div>

<!-- PAGE 2 -->
<div class="section" id="page2">

    <div class="alien">👽</div>
    <div class="board">You are correct my friend 😎</div>

    <div class="fun-text">
        Naa solla vara vishayam enna na... 😏<br><br>
        Nee oru korangu 🐒😂
    </div>

    <img class="monkey" src="https://upload.wikimedia.org/wikipedia/commons/7/7f/Monkey_smiling.jpg">

</div>

<script>

function checkCode() {
    let code = document.getElementById("code").value;

    if(code === "prakshi43") {
        document.getElementById("page1").style.display = "none";
        document.getElementById("page2").style.display = "flex";
    } else {
        alert("Wrong code 😜 Try again!");
    }
}

</script>

</body>
</html>
